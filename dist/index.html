<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React Chess</title>
  <script src="https://cdn.tailwindcss.com"></script>
    <style>
    /* Custom Scrollbar for Move History */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(30, 41, 59, 0.5);
      border-radius: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(71, 85, 105, 0.8);
      border-radius: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(100, 116, 139, 1);
    }

    /* Dynamic Shine Animation for Title */
    @keyframes shine {
      0% { background-position: 200% center; }
      100% { background-position: -200% center; }
    }
    .animate-shine {
      background: linear-gradient(120deg, var(--theme-light) 20%, var(--theme-dark) 40%, var(--theme-dark) 60%, var(--theme-light) 80%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: shine 4s linear infinite;
    }

    /* Dynamic Drop Shadow for Title */
    .dynamic-title-shadow {
      filter: drop-shadow(0 0 10px color-mix(in srgb, var(--theme-light) 30%, transparent));
      transition: filter 0.3s;
    }
    .group:hover .dynamic-title-shadow {
      filter: drop-shadow(0 0 15px color-mix(in srgb, var(--theme-light) 60%, transparent));
    }

    /* Dynamic Shimmer for Subtitle */
    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    .animate-shimmer {
      animation: shimmer 2.5s infinite linear;
      background: linear-gradient(to right, transparent, color-mix(in srgb, var(--theme-light) 40%, transparent), transparent);
    }

    /* Dynamic Turn Indicator Glow Animation */
    @keyframes turn-glow {
      0% { text-shadow: 0 0 0px transparent; filter: brightness(100%); }
      50% { text-shadow: 0 0 20px var(--theme-light); filter: brightness(150%); }
      100% { text-shadow: 0 0 0px transparent; filter: brightness(100%); }
    }
    .animate-turn-glow {
      animation: turn-glow 1s ease-in-out;
    }

    /* Epic King Death Animation (3 seconds total) */
    @keyframes king-epic-death {
      0% { transform: scale(1); filter: brightness(100%); }
      10% { transform: scale(1.1) rotate(-5deg); filter: brightness(120%) sepia(100%) hue-rotate(-50deg) saturate(300%); }
      20% { transform: scale(1.1) rotate(5deg); filter: brightness(120%) sepia(100%) hue-rotate(-50deg) saturate(300%); }
      30% { transform: scale(1.15) rotate(-5deg); filter: brightness(150%) sepia(100%) hue-rotate(-50deg) saturate(400%) drop-shadow(0 0 10px red); }
      40% { transform: scale(1.15) rotate(5deg); filter: brightness(150%) sepia(100%) hue-rotate(-50deg) saturate(400%) drop-shadow(0 0 10px red); }
      50% { transform: scale(1.3) rotate(0deg); filter: brightness(200%) sepia(100%) hue-rotate(-20deg) saturate(500%) drop-shadow(0 0 30px orange); }
      60% { transform: scale(1.5); filter: brightness(500%) drop-shadow(0 0 50px white); opacity: 1; }
      70% { transform: scale(2); filter: brightness(1000%); opacity: 0.8; }
      100% { transform: scale(0); filter: brightness(0%); opacity: 0; }
    }
    .animate-king-epic-death {
      animation: king-epic-death 3s ease-in-out forwards;
    }

    /* Shockwave */
    @keyframes shockwave-expand {
      0% { transform: scale(0); opacity: 1; border-width: 20px; }
      100% { transform: scale(8); opacity: 0; border-width: 0px; }
    }
    .shockwave {
      position: absolute;
      top: 50%; left: 50%;
      width: 50px; height: 50px;
      margin-top: -25px; margin-left: -25px;
      border-radius: 50%;
      border: solid #fbbf24;
      box-shadow: 0 0 30px #ef4444, inset 0 0 30px #ef4444;
      opacity: 0;
      animation: shockwave-expand 1s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
      animation-delay: 1.8s; /* Triggers exactly at the 60% mark of the 3s king animation */
      pointer-events: none;
      z-index: 35;
    }

    /* Epic Particles */
    @keyframes epic-particle-shoot {
      0%, 60% { transform: translate(0, 0) scale(0) rotate(0deg); opacity: 0; }
      61% { transform: translate(0, 0) scale(1.5) rotate(0deg); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0) rotate(var(--rot)); opacity: 0; }
    }
    .epic-particle {
      position: absolute;
      width: 16px; height: 16px;
      top: 50%; left: 50%;
      margin-top: -8px; margin-left: -8px;
      opacity: 0;
      animation: epic-particle-shoot 3s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
      z-index: 40;
      pointer-events: none;
    }
  </style>
  <script type="module" crossorigin src="/games/chess/assets/index-DJQ50YPe.js"></script>
</head>
<body class="bg-slate-950 text-slate-200 h-[100dvh] w-screen overflow-hidden antialiased selection:bg-indigo-500/30">
  <div id="root" class="h-full w-full"></div>
</body>
</html>
